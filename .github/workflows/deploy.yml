name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Check out latest code
        uses: actions/checkout@v4

      - name: Install / upgrade Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Restart OpenClaw gateway service
        run: |
          sudo systemctl restart openclaw-prayerbot-gateway
          sudo systemctl is-active --quiet openclaw-prayerbot-gateway \
            && echo "Service restarted successfully." \
            || (echo "Service failed to restart." && exit 1)
